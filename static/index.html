<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AbojutoAI — Surveillance Dashboard</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0d14;
      --surface:   #121722;
      --surface2:  #1a2030;
      --border:    #1e2a3a;
      --accent:    #00c2ff;
      --danger:    #ff3b3b;
      --warning:   #ffb800;
      --success:   #00e676;
      --text:      #e0e8f0;
      --muted:     #607080;
      --font:      'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
    }

    /* ── Layout ───────────────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-rows: 56px 1fr;
      height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .logo .icon { font-size: 22px; }
    .logo span.accent { color: var(--accent); }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.4s;
    }
    .status-dot.live { background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }
    .status-dot.alert { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    .main {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 0;
      overflow: hidden;
    }

    /* ── Camera panel ─────────────────────────────────────────── */
    .camera-panel {
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 16px;
      overflow-y: auto;
    }

    .camera-wrap {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      aspect-ratio: 4/3;
      max-height: 480px;
    }
    .camera-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .camera-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    }
    .cam-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent);
    }
    .cam-time {
      font-size: 11px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .alert-flash {
      position: absolute;
      inset: 0;
      border: 3px solid var(--danger);
      border-radius: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .alert-flash.active { opacity: 1; animation: flash 0.8s ease 3; }
    @keyframes flash { 0%,100%{opacity:0} 50%{opacity:1} }

    /* ── Stats row ────────────────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .stat-card .label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .stat-card .value {
      font-size: 26px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .stat-card .value.accent { color: var(--accent); }
    .stat-card .value.danger { color: var(--danger); }
    .stat-card .value.success { color: var(--success); }

    /* ── Snapshot grid ────────────────────────────────────────── */
    .section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .snap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }
    .snap-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .snap-item:hover { border-color: var(--accent); }
    .snap-item img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .snap-item .snap-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 6px 8px;
      font-size: 10px;
      color: var(--muted);
    }
    .snap-item .snap-badge {
      position: absolute;
      top: 6px; right: 6px;
      background: var(--danger);
      color: #fff;
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 10px;
      font-weight: 700;
    }

    /* ── Right panel (alerts feed) ────────────────────────────── */
    .alerts-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.3px;
    }
    .badge {
      background: var(--danger);
      color: #fff;
      border-radius: 100px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
      min-width: 22px;
      text-align: center;
    }
    .alerts-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .alerts-list::-webkit-scrollbar { width: 4px; }
    .alerts-list::-webkit-scrollbar-track { background: transparent; }
    .alerts-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .alert-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .alert-card.new { border-color: var(--danger); }
    .alert-icon {
      font-size: 20px;
      margin-top: 1px;
    }
    .alert-body .alert-title {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 3px;
    }
    .alert-body .alert-meta {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.6;
    }
    .alert-thumb {
      margin-top: 8px;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .alert-thumb img {
      width: 100%;
      display: block;
      aspect-ratio: 16/9;
      object-fit: cover;
    }
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .empty-state .ei { font-size: 36px; opacity: 0.4; }

    /* ── Modal ────────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      max-width: 90vw;
      max-height: 90vh;
      overflow: auto;
    }
    .modal-box img { width: 100%; display: block; border-radius: 14px; }
    .modal-close {
      position: fixed;
      top: 16px; right: 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 18px;
      z-index: 101;
    }
    .modal-close:hover { background: var(--danger); }

    /* ── Connection toast ─────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 12px;
      color: var(--muted);
      z-index: 200;
      transition: opacity 0.4s;
      opacity: 0;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="app">
  <!-- ── Header ── -->
  <header>
    <div class="logo">
      <span class="icon">🛡️</span>
      <span>Abojuto<span class="accent">AI</span></span>
    </div>
    <div style="display:flex;gap:12px;align-items:center">
      <button id="camToggleBtn" onclick="toggleCamera()" style="
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: background 0.2s, border-color 0.2s;
      ">
        <span id="camToggleIcon">⏸</span>
        <span id="camToggleLabel">Camera Off</span>
      </button>
      <div class="status-pill">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusLabel">Connecting…</span>
      </div>
    </div>
  </header>

  <div class="main">
    <!-- ── Camera + stats ── -->
    <div class="camera-panel">

      <!-- Live feed -->
      <div class="camera-wrap">
        <img id="liveFeed" src="/video_feed" alt="Live Feed" />
        <div id="camOffOverlay" style="
          display: none;
          position: absolute;
          inset: 0;
          background: #000;
          align-items: center;
          justify-content: center;
          flex-direction: column;
          gap: 12px;
          color: var(--muted);
          font-size: 14px;
          font-weight: 600;
        ">
          <span style="font-size:48px;opacity:0.3">📷</span>
          <span>Camera is off</span>
        </div>
        <div class="camera-overlay">
          <span class="cam-label">📹 Live Camera</span>
          <span class="cam-time" id="clockDisplay">--:--:--</span>
        </div>
        <div class="alert-flash" id="alertFlash"></div>
      </div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="label">Total Events</div>
          <div class="value accent" id="statEvents">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Persons Detected</div>
          <div class="value danger" id="statPersons">0</div>
        </div>
        <div class="stat-card">
          <div class="label">Avg Confidence</div>
          <div class="value success" id="statConf">—</div>
        </div>
      </div>

      <!-- Snapshots -->
      <div>
        <div class="section-title">Recent Snapshots</div>
        <div class="snap-grid" id="snapGrid">
          <!-- filled by JS -->
        </div>
      </div>
    </div>

    <!-- ── Alerts feed ── -->
    <div class="alerts-panel">
      <div class="panel-header">
        <span class="panel-title">🚨 Alert Feed</span>
        <span class="badge" id="alertBadge">0</span>
      </div>
      <div class="alerts-list" id="alertsList">
        <div class="empty-state" id="emptyState">
          <span class="ei">👁️</span>
          <span>Monitoring… No alerts yet</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <div class="modal-box" onclick="event.stopPropagation()">
    <img id="modalImg" src="" alt="Snapshot" />
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  let alertCount  = 0;
  let totalPersons = 0;
  let ws;

  // ── Clock ─────────────────────────────────────────────────────────────────
  setInterval(() => {
    document.getElementById('clockDisplay').textContent =
      new Date().toLocaleTimeString();
  }, 1000);

  // ── Toast ─────────────────────────────────────────────────────────────────
  function showToast(msg, duration = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  function openModal(src) {
    document.getElementById('modalImg').src = src;
    document.getElementById('modal').classList.add('open');
  }
  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  // ── Stats update ──────────────────────────────────────────────────────────
  function updateStats(data) {
    if (!data) return;
    if (data.total_events   !== undefined) document.getElementById('statEvents').textContent  = data.total_events;
    if (data.total_detections !== undefined) document.getElementById('statPersons').textContent = data.total_detections;
    if (data.avg_confidence !== undefined && data.avg_confidence > 0)
      document.getElementById('statConf').textContent = (data.avg_confidence * 100).toFixed(1) + '%';
  }

  // ── Alert card ────────────────────────────────────────────────────────────
  function addAlertCard(event, isNew = true) {
    document.getElementById('emptyState')?.remove();

    const time = new Date(event.timestamp).toLocaleTimeString();
    const conf = event.avg_conf ? (event.avg_conf * 100).toFixed(1) + '%' : '—';
    const card = document.createElement('div');
    card.className = 'alert-card' + (isNew ? ' new' : '');

    card.innerHTML = `
      <div class="alert-icon">⚠️</div>
      <div class="alert-body">
        <div class="alert-title">${event.count} person${event.count > 1 ? 's' : ''} detected</div>
        <div class="alert-meta">
          🕐 ${time}<br>
          📊 Confidence: ${conf}<br>
          🆔 Event #${event.id}
        </div>
        ${event.snapshot ? `
        <div class="alert-thumb" onclick="openModal('/${event.snapshot}')">
          <img src="/${event.snapshot}" alt="Snapshot" loading="lazy" />
        </div>` : ''}
      </div>
    `;

    const list = document.getElementById('alertsList');
    list.insertBefore(card, list.firstChild);

    // Remove 'new' highlight after 3s
    if (isNew) setTimeout(() => card.classList.remove('new'), 3000);
  }

  // ── Snapshot grid ─────────────────────────────────────────────────────────
  function addSnapshot(event) {
    if (!event.snapshot) return;
    const grid = document.getElementById('snapGrid');
    const item = document.createElement('div');
    item.className = 'snap-item';
    item.onclick = () => openModal('/' + event.snapshot);

    const time = new Date(event.timestamp).toLocaleTimeString();
    item.innerHTML = `
      <img src="/${event.snapshot}" alt="Snapshot" loading="lazy" />
      <div class="snap-info">${time}</div>
      <div class="snap-badge">${event.count}👤</div>
    `;

    grid.insertBefore(item, grid.firstChild);
    // Keep max 12 thumbnails
    while (grid.children.length > 12) grid.removeChild(grid.lastChild);
  }

  // ── Alert flash ───────────────────────────────────────────────────────────
  function triggerFlash() {
    const flash = document.getElementById('alertFlash');
    const dot   = document.getElementById('statusDot');
    flash.classList.remove('active');
    void flash.offsetWidth;  // reflow
    flash.classList.add('active');
    dot.classList.add('alert');
    setTimeout(() => dot.classList.remove('alert'), 3000);
  }

  // ── Load existing events ──────────────────────────────────────────────────
  async function loadHistory() {
    try {
      const [events, stats] = await Promise.all([
        fetch('/api/events').then(r => r.json()),
        fetch('/api/stats').then(r => r.json()),
      ]);

      updateStats(stats);
      alertCount = stats.total_events || 0;
      totalPersons = stats.total_detections || 0;

      // Load latest 10 into feed and grid
      events.slice(0, 10).reverse().forEach(ev => {
        addAlertCard(ev, false);
        addSnapshot(ev);
      });
      document.getElementById('alertBadge').textContent = alertCount;
    } catch (e) {
      console.warn('History load failed:', e);
    }
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
      const dot = document.getElementById('statusDot');
      dot.classList.add('live');
      document.getElementById('statusLabel').textContent = 'Live';
      showToast('Connected to AbojutoAI');
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'stats') {
        updateStats(msg.data);
      }

      if (msg.type === 'detection') {
        const ev = msg.event;
        alertCount++;
        totalPersons += ev.count;

        document.getElementById('alertBadge').textContent = alertCount;
        addAlertCard(ev, true);
        addSnapshot(ev);
        updateStats({ total_events: alertCount, total_detections: totalPersons, avg_confidence: ev.avg_conf });
        triggerFlash();

        // Browser notification
        if (Notification.permission === 'granted') {
          new Notification('AbojutoAI Alert', {
            body: `${ev.count} person(s) detected`,
            icon: '/static/icon.png',
          });
        }
      }
    };

    ws.onclose = () => {
      document.getElementById('statusDot').className = 'status-dot';
      document.getElementById('statusLabel').textContent = 'Reconnecting…';
      showToast('Connection lost — retrying…', 4000);
      setTimeout(connectWS, 3000);
    };

    ws.onerror = () => ws.close();
  }

  // ── Request browser notifications ─────────────────────────────────────────
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }

  // ── Camera toggle ─────────────────────────────────────────────────────────
  let cameraOff = false;

  async function toggleCamera() {
    const btn = document.getElementById('camToggleBtn');
    btn.disabled = true;
    try {
      const endpoint = cameraOff ? '/api/camera/on' : '/api/camera/off';
      await fetch(endpoint, { method: 'POST' });
      cameraOff = !cameraOff;
      applyCameraState();
    } finally {
      btn.disabled = false;
    }
  }

  function applyCameraState() {
    const feed = document.getElementById('liveFeed');
    const overlay = document.getElementById('camOffOverlay');
    const icon = document.getElementById('camToggleIcon');
    const label = document.getElementById('camToggleLabel');
    const btn = document.getElementById('camToggleBtn');

    if (cameraOff) {
      feed.src = '';
      overlay.style.display = 'flex';
      icon.textContent = '▶';
      label.textContent = 'Camera On';
      btn.style.borderColor = 'var(--success)';
      btn.style.color = 'var(--success)';
      showToast('Camera turned off');
    } else {
      feed.src = '/video_feed';
      overlay.style.display = 'none';
      icon.textContent = '⏸';
      label.textContent = 'Camera Off';
      btn.style.borderColor = 'var(--border)';
      btn.style.color = 'var(--text)';
      showToast('Camera turned on');
    }
  }

  // ── Boot ──────────────────────────────────────────────────────────────────
  loadHistory();
  connectWS();
</script>
</body>
</html>
